<!DOCTYPE html>
<html>

<head>
    <title>Student Life Helper - Alumno Pablo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Student Life Helper</h1>

    <h2>Tu nombre</h2>
    <input id="nombre">
    <button onclick="mostrarMensaje()">Saludar</button>

    <p id="mensaje"></p>

    <hr>

    <h2>Calculadora de nota media</h2>

    <input id="nota1" placeholder="Nota 1">
    <input id="nota2" placeholder="Nota 2">
    <input id="nota3" placeholder="Nota 3">

    <button onclick="calcularMedia()">Calcular</button>

    <p id="resultado"></p>

    <hr>

    <h2>Modo de color</h2>

    <button onclick="modoOscuro()">Modo oscuro</button>

    <hr>

    <h2>Motivación</h2>

    <button onclick="fraseMotivadora()">Motivarme</button>

    <p id="frase"></p>

    <script src="script.js"></script>

</body>

</html>
